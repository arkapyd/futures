<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for nistha</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap');

        :root {
            --bg-color: #0a0406; /* deeper, subtly red-tinted black */
            --text-primary: #f2ecee; /* soft off-white */
            --text-secondary: #8a7c80; /* muted mauve-grey */
            --accent: #3d1422; /* dim dark pink/burgundy for resting borders */
            --hover-bg: #80133b; /* intense dark pink */
            --hover-text: #ffffff; /* stark white for sharp contrast */
            --glow: rgba(220, 20, 80, 0.25); /* urgent red/pink glow */
        }

        body {
            background-color: var(--bg-color);
            /* subtle dark vignette for an enclosed, urgent feel */
            background: radial-gradient(circle at center, #0a0406 40%, #000000 100%);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* custom scrollbar to match the theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--hover-bg);
        }

        #game-container {
            max-width: 1200px; /* significantly widens the layout */
            width: 92%; /* leaves a small, clean margin on the very edges */
            text-align: center;
        }

        #story-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.6rem, 2.2vw, 2.4rem); /* makes text scale up dynamically on larger screens */
            line-height: 1.6;
            margin-bottom: 4rem;
            min-height: 120px;
            transition: opacity 0.4s ease-in-out;
        }

        #choices-container {
            display: flex;
            flex-direction: column;
            align-items: center; /* keeps the buttons centered in the new, wider container */
            gap: 15px;
            transition: opacity 0.4s ease-in-out;
        }

        .choice-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--accent);
            padding: 15px 20px;
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.95rem, 1vw, 1.1rem);
            letter-spacing: 0.5px;
            cursor: pointer;
            border-radius: 4px;
            /* slightly faster transition to build tension */
            transition: all 0.15s ease-out;
            text-transform: lowercase;
            width: 100%;
            max-width: 700px;
        }

        .choice-btn:hover {
            background-color: var(--hover-bg);
            color: var(--hover-text);
            border-color: var(--hover-bg);
            /* aggressive outer glow combined with a dark inner shadow */
            box-shadow: 0 0 20px var(--glow), inset 0 0 10px rgba(0,0,0,0.3);
            transform: translateY(-2px);
            /* subtle text expansion on hover for urgency */
            letter-spacing: 1px; 
        }
    </style>
</head>

            },
        };

        // function to render the current node
        function renderNode(nodeId) {
            const node = storyData[nodeId];
            const storyEl = document.getElementById('story-text');
            const choicesEl = document.getElementById('choices-container');

            // fade out
            storyEl.style.opacity = 0;
            choicesEl.style.opacity = 0;

            // wait for fade out to complete before swapping text
            setTimeout(() => {
                storyEl.innerHTML = node.text;
                choicesEl.innerHTML = '';

                if (node.choices && node.choices.length > 0) {
                    node.choices.forEach(choice => {
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.innerText = choice.text;
                        btn.onclick = () => renderNode(choice.target);
                        choicesEl.appendChild(btn);
                    });
                }

                // fade back in
                storyEl.style.opacity = 1;
                choicesEl.style.opacity = 1;
            }, 400); // matches the 0.4s css transition
        }

        // initialize the story
        window.onload = () => renderNode('start');
    </script>
</body>
</html>
