<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for nistha</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap');

        :root {
            --bg-color: #08080a;
            --text-primary: #ededed;
            --text-secondary: #a0a0ab;
            --accent: #5e5e6e;
            --glow: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        #game-container {
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        #story-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            line-height: 1.6;
            margin-bottom: 3rem;
            min-height: 120px;
            transition: opacity 0.4s ease-in-out;
        }

        #choices-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: opacity 0.4s ease-in-out;
        }

        .choice-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--accent);
            padding: 15px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: lowercase;
        }

        .choice-btn:hover {
            color: var(--text-primary);
            border-color: var(--text-primary);
            box-shadow: 0 0 15px var(--glow);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="story-text"></div>
        <div id="choices-container"></div>
    </div>

    <script>
        // this object holds the entire story tree
        const storyData = {
            start: {
                text: "<p>it's getting late. you had promised me you'd be there on time, but it was already ten past six now, and you hadn't even sorted out what to wear. knowing me, you knew i would be there at the café in twenty minutes' time, not a minute here or there. you rush about, pausing to fix your hair in the mirror, to dab at your lips with the lip-gloss. </p> <p> a smile here, as you wonder how long that lip gloss would get to stay on anyway. </p> <p> you look at your face, satisfied. then your eyes wander down your body. ",
                choices: [
                    { text: "everything looks perfect as it is. it's getting late anyway.", target: "node_bag" },
                    { text: "oh, i don't know. maybe different set of underwear? i know where this night is headed.", target: "node_underwear" },
                    { text: "the top, maybe. a kurti? or a dress?", target: "node_wardrobe" }
                ]
            },
            
            // iteration 1 placeholders
            node_bag: {
                text: "<p>this was the right choice, given the time constraints. you know i love how you look anyway, wearing anything or nothing. you grab your little black purse, and peer inside.</p> <p> hmm. better to stuff in a few things before i head out. </p>",
                choices: [
                    { text: "maybe i'll just carry the stick of lip-gloss. god knows it's going to have to come out at least once.", target: "node_lipgloss" }, 
                    { text: "hmm. should i take a condom or two? ", target: "node_condom" },
                    { text: "your gift! i nearly forgot.", target: "node_gift" }
                ]
            },
            node_underwear: {
                text: "how silly, you think. the make-up and hair is in place. why go to the trouble of changing all the way through?",
                choices: [
                    { text: "better get the purse sorted out.", target: "node_bag" },
                    { text: "oh! i nearly missed your gift. better grab it on my way out.", target: "node_gift" },
                    { text: "i must hurry now, just look at the time!", target: "node_nothing" }
                ]
            },
            node_wardrobe: {
                text: "there is not a chance you can get changed now, and besides, the hair and everything else sits quite prettily, you think to yourself. ",
                choices: [
                    { text: "i should just get my purse and check everything now.", target: "node_bag" },
                    { text: "wait. i nearly forgot about your gift!", target: "node_gift" },
                    { text: "forget everything; it's late and he's not going to like to sit by himself, waiting for me. i must leave.", target: "node_nothing" }
                ]
            },
            node_gift: {
                text: "it sits wrapped on the desk, just under the mirror, a little rectangular box. the paper crinkles against your touch as you put it into your black purse. ",
                choices: [
                    { text: "okay. i have everything now. i need to run, now.", target: "node_out" },
                    { text: "i think i am forgetting something. agh. can't help it, i am late! time to go.", target: "node_out" }
                ]
            },
            node_nothing: {
                text: "it is so late already. you like it when i joke about your tardiness and call you my babysloth, and the like, but sometimes you can sense that you test my patience with your habit of never being on time. <p> no more of that, you think, as you rush out the door, hurriedly locking it, and bracing to go out into the chill of the October night in Leh. </p> ",
                choices: [
                    { text: "it's...cold outside.", target: "node_out" }
                ]
            },
            node_lipgloss: {
                text: "we haven't met in weeks. there's bound to be at least one episode of me attacking you, you think. good idea to keep the lipgloss on; in this weather, kisses of the angry, passionate kind - the kind you are sure i will assault you with tonight - drain lips of moisture quicker than anything else. ",
                choices: [
                    { text: "okay, i am finally done, i think. time to go.", target: "node_out" },
                    { text: "i think i am forgetting something. agh. can't help it, i am late! time to go.", target: "node_out" }
                ]
            },
            node_condom: {
                text: "knowing me, you know i will not want to keep my hands off you for long. and you are not opposed to the idea of taking it all the way. you know i will find a way to make it happen, if it is to happen. ",
                choices: [
                    { text: "better safe than sorry. heh. anyway, time to go now.", target: "node_out" },
                    { text: "i think i am forgetting something. agh. can't help it, i am late! time to go.", target: "node_out" }
                ]
            },
            
        };

        // function to render the current node
        function renderNode(nodeId) {
            const node = storyData[nodeId];
            const storyEl = document.getElementById('story-text');
            const choicesEl = document.getElementById('choices-container');

            // fade out
            storyEl.style.opacity = 0;
            choicesEl.style.opacity = 0;

            // wait for fade out to complete before swapping text
            setTimeout(() => {
                storyEl.innerHTML = node.text;
                choicesEl.innerHTML = '';

                if (node.choices && node.choices.length > 0) {
                    node.choices.forEach(choice => {
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.innerText = choice.text;
                        btn.onclick = () => renderNode(choice.target);
                        choicesEl.appendChild(btn);
                    });
                }

                // fade back in
                storyEl.style.opacity = 1;
                choicesEl.style.opacity = 1;
            }, 400); // matches the 0.4s css transition
        }

        // initialize the story
        window.onload = () => renderNode('start');
    </script>
</body>
</html>
